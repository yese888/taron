name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.2.0)'
        required: true

jobs:
  build-linux:
    name: Build Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake clang libclang-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release -p taron
        env:
          CARGO_TERM_COLOR: always

      - name: Package
        run: |
          mkdir -p dist
          cp target/release/taron dist/taron-linux-x64
          chmod +x dist/taron-linux-x64
          tar -czf dist/taron-linux-x64.tar.gz -C dist taron-linux-x64

      - uses: actions/upload-artifact@v4
        with:
          name: taron-linux-x64
          path: dist/taron-linux-x64.tar.gz

  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install LLVM
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "18"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release -p taron
        env:
          CARGO_TERM_COLOR: always
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin

      - name: Package
        run: |
          mkdir dist
          copy target\release\taron.exe dist\taron-windows-x64.exe
          Compress-Archive -Path dist\taron-windows-x64.exe -DestinationPath dist\taron-windows-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: taron-windows-x64
          path: dist/taron-windows-x64.zip

  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: taron-linux-x64
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: taron-windows-x64
          path: dist/

      - name: Get tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: TARON ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: true
          body: |
            ## TARON ${{ steps.tag.outputs.tag }} — Testnet

            CPU-only cryptocurrency with instant finality (<0.2s).

            ### Download

            | Platform | File |
            |---|---|
            | Linux x64 | `taron-linux-x64.tar.gz` |
            | Windows x64 | `taron-windows-x64.zip` |

            ### Quick Start

            ```bash
            # Generate wallet
            ./taron --testnet wallet generate

            # Solo mining
            ./taron --testnet node start --mine --threads 4

            # Pool mining
            ./taron --testnet node start --mine --pool https://pool-api.taron.network --threads 4
            ```

            ### Seed node
            `seed.taron.network:8333`
          files: |
            dist/taron-linux-x64.tar.gz
            dist/taron-windows-x64.zip
